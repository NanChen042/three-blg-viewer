<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三维模型展厅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body class="h-screen overflow-hidden bg-slate-100 text-slate-950 antialiased max-[760px]:h-auto max-[760px]:overflow-auto">
    <div class="viewer-shell flex h-screen flex-col max-[760px]:h-auto max-[760px]:min-h-screen">
      <header class="topbar shrink-0 border-b border-slate-200 bg-white px-5 py-3 max-[760px]:px-3">
        <div class="mx-auto grid max-w-[1600px] grid-cols-[minmax(220px,1fr)_minmax(220px,0.55fr)_auto] items-center gap-4 max-[1080px]:grid-cols-[1fr_auto] max-[760px]:grid-cols-1 max-[760px]:gap-3">
          <div class="min-w-0">
            <p class="text-xs font-medium text-slate-500">本地实时模型查看器</p>
            <h1 class="mt-1 truncate text-xl font-semibold leading-tight tracking-normal text-slate-950 max-[760px]:text-lg">三维模型展厅</h1>
          </div>

          <div class="model-chip grid min-w-0 gap-0.5 border-l border-slate-200 pl-4 max-[1080px]:col-span-full max-[1080px]:border-l-0 max-[1080px]:border-t max-[1080px]:pt-3 max-[1080px]:pl-0" aria-live="polite">
            <span class="text-xs font-medium text-slate-500">当前模型</span>
            <strong id="modelName" class="truncate text-sm font-semibold text-slate-900">黄洋葱 2K 材质模型</strong>
          </div>

          <div class="toolbar flex min-w-0 flex-wrap justify-end gap-2 max-[760px]:grid max-[760px]:grid-cols-3">
            <input id="fileInput" class="sr-only" type="file" accept=".glb,.gltf,model/gltf-binary,model/gltf+json" />
            <button
              id="openModelButton"
              class="h-9 rounded bg-slate-900 px-3 text-sm font-semibold text-white hover:bg-slate-800"
              type="button"
            >
              导入模型
            </button>
            <button
              id="resetViewButton"
              class="h-9 rounded border border-slate-300 bg-white px-3 text-sm font-semibold text-slate-800 hover:bg-slate-50"
              type="button"
            >
              复位视角
            </button>
            <button
              id="defaultModelButton"
              class="h-9 rounded border border-slate-300 bg-white px-3 text-sm font-semibold text-slate-800 hover:bg-slate-50"
              type="button"
            >
              内置模型
            </button>
          </div>
        </div>
      </header>

      <main class="viewer-main mx-auto flex min-h-0 w-full max-w-[1600px] flex-1 bg-slate-100 max-[760px]:flex-none max-[760px]:flex-col">
        <section id="stage" class="stage relative min-h-0 flex-1 overflow-hidden max-[760px]:h-[52vh] max-[760px]:min-h-[320px] max-[760px]:flex-none" aria-label="3D model viewport">
          <div id="dropOverlay" class="drop-overlay">松手导入模型</div>
          <div id="loadingOverlay" class="loading-overlay" hidden aria-hidden="true">
            <span class="loader"></span>
            <span id="loadingText">正在加载模型</span>
          </div>
        </section>

        <aside
          id="controlsPanel"
          class="controls-panel grid w-[360px] shrink-0 content-start gap-3 overflow-y-auto border-l border-slate-200 bg-white p-4 text-slate-950 max-[760px]:w-full max-[760px]:border-l-0 max-[760px]:border-t max-[760px]:p-3"
          aria-label="Viewer controls"
        >
          <div class="panel-heading flex items-end justify-between gap-3 border-b border-slate-200 pb-3">
            <div>
              <span class="text-xs font-medium text-slate-500">渲染参数</span>
              <h2 class="text-base font-semibold leading-tight text-slate-950">显示设置</h2>
            </div>
            <div class="flex shrink-0 items-center gap-2">
              <span id="statusPill" class="rounded border border-emerald-200 bg-emerald-50 px-2.5 py-1 text-xs font-semibold text-emerald-700">
                实时
              </span>
              <button
                id="panelToggleButton"
                class="h-8 rounded border border-slate-300 bg-white px-2.5 text-xs font-semibold text-slate-700 hover:bg-slate-50"
                type="button"
                aria-controls="panelBody"
                aria-expanded="true"
              >
                收起
              </button>
            </div>
          </div>

          <div id="panelBody" class="panel-body grid gap-3 max-[760px]:grid-cols-2" aria-hidden="false">
            <label class="switch-row grid min-h-8 grid-cols-[1fr_auto] items-center gap-3 text-sm font-medium text-slate-800">
              <span>自动旋转</span>
              <input id="autoRotateToggle" type="checkbox" checked />
            </label>

            <label class="switch-row grid min-h-8 grid-cols-[1fr_auto] items-center gap-3 text-sm font-medium text-slate-800">
              <span>线框模式</span>
              <input id="wireframeToggle" type="checkbox" />
            </label>

            <label class="control-row grid gap-2 text-sm font-medium text-slate-800 max-[760px]:col-span-2">
              <span>旋转速度</span>
              <input id="speedRange" type="range" min="0" max="2" step="0.05" value="0.45" />
            </label>

            <label class="control-row grid gap-2 text-sm font-medium text-slate-800 max-[760px]:col-span-2">
              <span>曝光</span>
              <input id="exposureRange" type="range" min="0.5" max="2" step="0.05" value="1.15" />
            </label>

            <label class="control-row grid gap-2 text-sm font-medium text-slate-800 max-[760px]:col-span-2">
              <span>主光</span>
              <input id="keyLightRange" type="range" min="0" max="8" step="0.1" value="4.2" />
            </label>

            <label class="control-row grid gap-2 text-sm font-medium text-slate-800 max-[760px]:col-span-2">
              <span>环境光</span>
              <input id="environmentRange" type="range" min="0" max="3" step="0.05" value="1.25" />
            </label>

            <section class="audio-player grid gap-3 rounded border border-slate-200 bg-slate-50 p-3 max-[760px]:col-span-2" aria-label="音频播放器">
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                  <h3 class="text-sm font-semibold leading-tight text-slate-950">环境音频</h3>
                  <p id="audioStatus" class="mt-1 text-xs font-medium text-slate-500">正在准备内置音频</p>
                </div>
                <button
                  id="playAudioButton"
                  class="h-8 shrink-0 rounded bg-slate-900 px-3 text-xs font-semibold text-white hover:bg-slate-800"
                  type="button"
                >
                  播放
                </button>
              </div>

              <audio id="ambientAudio" preload="auto" loop></audio>

              <div class="grid gap-1.5">
                <input id="audioProgress" type="range" min="0" max="1000" step="1" value="0" aria-label="音频进度" />
                <div class="flex justify-between text-[11px] font-medium text-slate-500">
                  <span id="audioCurrentTime">0:00</span>
                  <span id="audioDuration">0:00</span>
                </div>
              </div>

              <label class="grid gap-1.5 text-xs font-semibold text-slate-700">
                <span>音量</span>
                <input id="audioVolume" type="range" min="0" max="1" step="0.01" value="0.55" />
              </label>
            </section>
          </div>
        </aside>
      </main>

      <footer class="statusbar shrink-0 border-t border-slate-200 bg-white px-5 py-2 text-xs font-medium text-slate-500 max-[760px]:px-3">
        <div class="mx-auto flex max-w-[1600px] justify-between gap-3">
          <span id="statusText">就绪</span>
          <span>Three.js 0.165.0</span>
        </div>
      </footer>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
